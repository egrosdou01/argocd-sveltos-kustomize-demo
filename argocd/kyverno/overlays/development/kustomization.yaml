apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno
resources:
- ../../base
helmCharts:
- name: kyverno
  repo: https://kyverno.github.io/kyverno/
  version: 3.6.4
  releaseName: kyverno
  namespace: kyverno
  valuesFile: values.yaml
labels:
- pairs:
    environment: development
    tier: development
